<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#1d7f5b" />
    <meta name="description" content="浙江树人学院杨汛桥校区健身房 AI 会员服务智能体，支持咨询、套餐推荐、入会登记、会员管理和反馈统计。" />
    <title>树人健身房 AI 会员服务智能体 V1.0</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="树人健身房服务面板">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">树</div>
          <div>
            <h1>树人健身房</h1>
            <p>AI 会员服务智能体 V1.0</p>
          </div>
        </div>

        <section class="summary-panel" aria-label="运营概览">
          <div>
            <span>会员总数</span>
            <strong id="memberCount">0</strong>
          </div>
          <div>
            <span>反馈条数</span>
            <strong id="feedbackCount">0</strong>
          </div>
          <div>
            <span>预计收入</span>
            <strong id="incomeTotal">¥0</strong>
          </div>
        </section>

        <nav class="nav-tabs" aria-label="功能导航">
          <button class="tab-button active" data-tab="consult" type="button">智能咨询</button>
          <button class="tab-button" data-tab="recommend" type="button">套餐推荐</button>
          <button class="tab-button" data-tab="register" type="button">入会登记</button>
          <button class="tab-button" data-tab="manage" type="button">会员管理</button>
          <button class="tab-button" data-tab="feedback" type="button">反馈收集</button>
        </nav>
      </aside>

      <section class="workspace">
        <section class="toolbar">
          <div>
            <p class="eyebrow">浙江树人学院杨汛桥校区</p>
            <h2 id="activeTitle">智能咨询</h2>
          </div>
          <div class="toolbar-actions">
            <button class="ghost-button" id="exportMembersTop" type="button">导出会员 Excel</button>
            <button class="primary-button" id="exportFeedbackTop" type="button">导出反馈 Word</button>
          </div>
        </section>

        <section class="tab-panel active" id="consult">
          <div class="chat-layout">
            <div class="chat-panel">
              <div class="chat-log" id="chatLog" aria-live="polite"></div>
              <form class="chat-form" id="chatForm">
                <input id="chatInput" type="text" placeholder="输入问题，例如：有淋浴间吗？月卡多少钱？" autocomplete="off" />
                <button class="primary-button" type="submit">发送</button>
              </form>
            </div>
            <div class="quick-card">
              <h3>快捷问题</h3>
              <button class="quick-question" type="button">有淋浴间吗？</button>
              <button class="quick-question" type="button">年卡和月卡多少钱？</button>
              <button class="quick-question" type="button">我应该办哪种套餐？</button>
              <button class="quick-question" type="button">入会需要哪些信息？</button>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="recommend">
          <div class="form-grid two-col">
            <label>
              <span>预计训练月数</span>
              <input id="trainingMonths" type="number" min="1" max="24" value="3" />
            </label>
            <label>
              <span>每周训练次数</span>
              <input id="weeklyVisits" type="number" min="1" max="14" value="3" />
            </label>
            <label>
              <span>预算偏好</span>
              <select id="budgetPreference">
                <option value="value">更看重性价比</option>
                <option value="low">希望前期花费低</option>
                <option value="stable">长期稳定训练</option>
              </select>
            </label>
            <label>
              <span>训练目标</span>
              <select id="fitnessGoal">
                <option value="habit">养成运动习惯</option>
                <option value="shape">塑形增肌</option>
                <option value="fatloss">减脂体能</option>
                <option value="casual">偶尔锻炼</option>
              </select>
            </label>
          </div>
          <button class="primary-button wide" id="makeRecommendation" type="button">生成推荐</button>
          <div class="result-panel" id="recommendationResult"></div>
        </section>

        <section class="tab-panel" id="register">
          <form class="form-grid" id="memberForm">
            <label>
              <span>学号</span>
              <input name="studentId" required placeholder="例如：2024000001" />
            </label>
            <label>
              <span>专业班级姓名</span>
              <input name="profile" required placeholder="例如：计算机2401 张三" />
            </label>
            <label>
              <span>电话号码</span>
              <input name="phone" required placeholder="例如：13800000000" />
            </label>
            <label>
              <span>套餐档位</span>
              <select name="plan" required>
                <option value="年卡">年卡 ¥365</option>
                <option value="月卡">月卡 ¥200</option>
              </select>
            </label>
            <label class="full">
              <span>备注</span>
              <textarea name="note" rows="3" placeholder="可填写缴费状态、特殊说明等"></textarea>
            </label>
            <button class="primary-button wide" type="submit">保存会员登记</button>
          </form>
        </section>

        <section class="tab-panel" id="manage">
          <div class="section-actions">
            <input id="memberSearch" type="search" placeholder="搜索学号、姓名、电话或套餐" />
            <button class="ghost-button" id="exportMembers" type="button">生成 Excel 登记表</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>登记时间</th>
                  <th>学号</th>
                  <th>专业班级姓名</th>
                  <th>电话</th>
                  <th>套餐</th>
                  <th>金额</th>
                  <th>备注</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="memberTable"></tbody>
            </table>
          </div>
        </section>

        <section class="tab-panel" id="feedback">
          <form class="form-grid" id="feedbackForm">
            <label>
              <span>姓名</span>
              <input name="name" required placeholder="反馈人姓名" />
            </label>
            <label>
              <span>联系电话</span>
              <input name="phone" placeholder="可选" />
            </label>
            <label>
              <span>反馈类型</span>
              <select name="category" required>
                <option value="设备">设备</option>
                <option value="环境">环境</option>
                <option value="淋浴间">淋浴间</option>
                <option value="服务">服务</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label>
              <span>满意度</span>
              <select name="rating" required>
                <option value="5">5 - 很满意</option>
                <option value="4">4 - 满意</option>
                <option value="3">3 - 一般</option>
                <option value="2">2 - 不满意</option>
                <option value="1">1 - 很不满意</option>
              </select>
            </label>
            <label class="full">
              <span>反馈内容</span>
              <textarea name="content" rows="4" required placeholder="请记录会员建议、问题或表扬"></textarea>
            </label>
            <button class="primary-button wide" type="submit">提交反馈</button>
          </form>
          <div class="section-actions">
            <strong>反馈记录</strong>
            <button class="ghost-button" id="exportFeedback" type="button">生成 Word 统计文件</button>
          </div>
          <div class="feedback-list" id="feedbackList"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
